name: docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/ilovevideoeditor/cli
  DOCKERHUB_IMAGE: ilovevideoeditor/cli

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (when configured)
        if: vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAGS="${GHCR_IMAGE}:latest,${GHCR_IMAGE}:${VERSION}"
          if [ "${{ vars.DOCKERHUB_ENABLED }}" = "true" ]; then
            TAGS="$TAGS,${DOCKERHUB_IMAGE}:latest,${DOCKERHUB_IMAGE}:${VERSION}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: CLI_VERSION=${GITHUB_REF_NAME#v}
          tags: ${{ steps.tags.outputs.tags }}
